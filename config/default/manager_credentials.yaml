apiVersion: v1
kind: Secret
metadata:
  name: cluster-api-provider-freebox-freebox-secret
  namespace: cluster-api-provider-freebox-system
type: Opaque
stringData:
  token: "${FREEBOX_TOKEN}"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: cluster-api-provider-freebox-freebox-config
  namespace: cluster-api-provider-freebox-system
data:
  endpoint: "${FREEBOX_ENDPOINT}"
  version: "${FREEBOX_VERSION}"
  app_id: "${FREEBOX_APP_ID}"
  device: "${FREEBOX_DEVICE}"